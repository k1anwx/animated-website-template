<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>login template</title>
</head>
<body>
    <div class="login-container">
        <h1>LOGIN</h1>
        <div class="input-group">
            <label for="email">EMAIL</label>
            <input type="email" placeholder="your@email.com" id="email">
        </div>
        <div class="input-group">
            <label for="password">PASSWORD</label>
            <input type="password" placeholder="........" id="password">
        </div>
        <button type="submit">SIGN IN</button>
        <div class="divider">OR</div>
        <div class="social-login">
            <div class="social-btn">gmail</div>
            <div class="social-btn">github</div>
            <div class="social-btn">steam</div>
        </div>
        <div class="footer">
            Don't have an account? <a href="github-res/index.html">Sign up</a>
        </div>
    </div>
</body>
</html>
